<style>
    *{
    margin: 0px;
    padding: 0px;
}

.quiz-container{
    display: none;
    margin: 50px auto;
    
}
</style>


<div class="container">
  <div class="text-center mt-5">
    <button class="btn btn-success" onclick="startExam()">Start Exam</button>
  </div>
  
  <div class="quiz-container" id="quiz-container">
    <h2 class="text-center">Online Exam</h2>
    <p class="timer text-center">Time Left :<span id="timer">60</span>Seconds</p>
    <div class="progress-container" id="progress">Answered :0/3</div>
    <div id="quiz"></div>
    <button class="btn btn-primary" onclick="submitQuiz()">Submit</button>
    <button class="btn btn-secondary" onclick="restartQuiz()">Restart</button>
    <p id="result" class="mt-3 text-center"></p>
  </div>

</div>
